<!DOCTYPE html>
<html>
<head>
    <title>AI Flashcard Generator</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>📚 AI Flashcard Generator</h1>

    <p>
        Upload your notes and generate AI-powered flashcards.
    </p>

    <form action="/upload"
          method="POST"
          enctype="multipart/form-data">

        <input type="file"
               name="pdf"
               accept=".pdf"
               required>

        <br><br>

        <button type="submit">
            Generate Flashcards
        </button>

    </form>

</div>

</body>
</html>
