<!DOCTYPE html>
<html>
<head>
    <title>MCQ Practice</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>📝 MCQ Practice</h1>

    <a href="/download_mcqs">
        <button>
            📄 Download MCQ PDF
        </button>
    </a>

    <br><br>

    <p>
        Try solving first, then reveal the answer.
    </p>

    {% for mcq in mcqs %}

    <div class="card mcq-card">

        <h2 class="mcq-question">
            {{ mcq.question.split('\n')[0] }}
        </h2>

        <div class="mcq-options">

            {% for line in mcq.question.split('\n')[1:] %}

                {% if line.strip() %}
                    <div class="option-box">
                        {{ line }}
                    </div>
                {% endif %}

            {% endfor %}

        </div>

        <details class="answer-box">

            <summary>▼ Show Answer</summary>

            <p>
                ✅ Correct Answer:
                <strong>{{ mcq.answer }}</strong>
            </p>

        </details>

    </div>

    {% endfor %}

    <a href="/">
        <button>
            Generate More MCQs
        </button>
    </a>

</div>

</body>
</html>
