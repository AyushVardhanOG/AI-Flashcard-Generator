<!DOCTYPE html>
<html>
<head>
    <title>Quiz Results</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>🏆 Quiz Results</h1>

    <h2>
        Your Score: {{ score }}/{{ total }}
    </h2>

    {% for result in results %}

    <div class="card">

        <h3>{{ result.question }}</h3>

        <p>
            Your Answer:
            {{ result.user_answer }}
        </p>

        <p>
            Correct Answer:
            {{ result.correct_answer }}
        </p>

        {% if result.correct %}

        <p>✅ Correct</p>

        {% else %}

        <p>❌ Incorrect</p>

        {% endif %}

    </div>

    {% endfor %}

    <a href="/">
        <button>
            Try Another Quiz
        </button>
    </a>

</div>

</body>
</html>
